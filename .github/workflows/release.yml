name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  set_version:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - id: version
        shell: bash
        run: |
          VERSION="$(git log -1 --format=%s | tr -d '[:space:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  create_draft_release:
    needs: [set_version]
    runs-on: ubuntu-slim
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: AI Switcher ${{ needs.set_version.outputs.version }}
          body: |
            ${{ needs.set_version.outputs.version }} ${{ github.sha }}
          draft: true

  publish:
    needs: [set_version, create_draft_release]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Bump version
        run: pnpm version:bump "${{ needs.set_version.outputs.version }}"

      - uses: tauri-apps/tauri-action@v0
        with:
          releaseId: ${{ needs.create_draft_release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  finalize_release:
    needs: [set_version, create_draft_release, publish]
    runs-on: ubuntu-slim
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set_version.outputs.version }}
          draft: false
