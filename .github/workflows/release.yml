name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  set_version:
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: version
        run: |
          VERSION="$(git log -1 --format=%s | tr -d '[:space:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  create_draft_release:
    needs: [set_version]
    runs-on: ubuntu-slim
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: AI Switcher ${{ needs.set_version.outputs.version }}
          body: |
            AI Switcher ${{ needs.set_version.outputs.version }} ${{ github.sha }}
          draft: true

  publish:
    needs: [set_version, create_draft_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle_dir: dmg
            file_pattern: "*.dmg"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_dir: nsis
            file_pattern: "*-setup.exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - run: pnpm install

      - run: pnpm version:bump "${{ needs.set_version.outputs.version }}"

      - uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }}

      - id: rename_installer
        shell: bash
        run: |
          dir="src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}"
          source="$(find "$dir" -maxdepth 1 -type f -name '${{ matrix.file_pattern }}' -print -quit)"
          target="${source/_${{ needs.set_version.outputs.version }}/}"
          mv "$source" "$target"
          echo "file=$target" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set_version.outputs.version }}
          draft: true
          files: ${{ steps.rename_installer.outputs.file }}

  finalize_release:
    needs: [set_version, publish]
    runs-on: ubuntu-slim
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set_version.outputs.version }}
          draft: false
